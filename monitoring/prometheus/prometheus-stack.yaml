# Install via Helm:
# helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
# helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#   -n monitoring --create-namespace -f prometheus-values.yaml

# prometheus-values.yaml for kube-prometheus-stack
alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1

prometheus:
  enabled: true
  prometheusSpec:
    replicas: 1
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    additionalScrapeConfigs:
      - job_name: 'mern-backend'
        static_configs:
          - targets: ['backend.mern-app.svc.cluster.local:5000']
        metrics_path: /metrics
        scrape_interval: 15s

grafana:
  enabled: true
  adminPassword: "grafana-admin-pass"
  persistence:
    enabled: true
    size: 5Gi
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      mern-app:
        gnetId: 11159
        revision: 1
        datasource: Prometheus

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
