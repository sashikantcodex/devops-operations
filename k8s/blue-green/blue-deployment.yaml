apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-blue
  namespace: mern-app
  labels:
    app: backend
    slot: blue
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      slot: blue
  template:
    metadata:
      labels:
        app: backend
        slot: blue
        version: v1
    spec:
      containers:
        - name: backend
          image: YOUR_ECR_REPO/mern-backend:v1
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: MYSQL_HOST
              value: "mysql-0.mysql.mern-app.svc.cluster.local"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-database
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
