apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-stable
  namespace: mern-app
  labels:
    app: backend
    track: stable
    version: v1
spec:
  replicas: 9   # 90% traffic (9 stable : 1 canary pods)
  selector:
    matchLabels:
      app: backend
      track: stable
  template:
    metadata:
      labels:
        app: backend
        track: stable
        version: v1
    spec:
      containers:
        - name: backend
          image: YOUR_ECR_REPO/mern-backend:v1
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
