apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mern-app-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mern-devops
  source:
    repoURL: https://github.com/YOUR_ORG/devops-operations.git
    targetRevision: main
    path: helm/mern-app
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: backend.image.tag
          value: latest
        - name: frontend.image.tag
          value: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: mern-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mern-app-staging
  namespace: argocd
spec:
  project: mern-devops
  source:
    repoURL: https://github.com/YOUR_ORG/devops-operations.git
    targetRevision: develop
    path: helm/mern-app
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: ingress.host
          value: staging.yourdomain.com
        - name: backend.replicaCount
          value: "1"
        - name: frontend.replicaCount
          value: "1"
  destination:
    server: https://kubernetes.default.svc
    namespace: mern-app-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
