services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mysql-root-pass
      MYSQL_DATABASE: merndb
      MYSQL_USER: mysql-user
      MYSQL_PASSWORD: mysql-pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mern-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: mysql-user
      MYSQL_PASSWORD: mysql-pass
      MYSQL_DATABASE: merndb
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: development
    ports:
      - "5001:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mern-network
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_logs:/var/log/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_VERSION: "1.0.0"
        REACT_APP_ENV: development
    container_name: mern-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mern-network

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: mysql-user
      PMA_PASSWORD: mysql-pass
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mern-network

volumes:
  mysql_data:
    driver: local
  backend_logs:
    driver: local

networks:
  mern-network:
    driver: bridge
